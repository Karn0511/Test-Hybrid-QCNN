training:
  max_rows: 10000             # SOTA Research Scale: 10,000 rows (Beast-Dataset)
  batch_size: 32              # Per-Expert worker batch size
  eval_batch_size: 512        # Xeon-Turbo evaluation throughput (32-core saturation)
  num_workers: 12             # Overdrive: Launch 12 concurrent kernels
  use_amp: True               # Automatic Mixed Precision for training stability
  grad_accum_steps: 8         # Aggressive accumulation for stable gradients
  device: "cpu"               # Xeon-Turbo Mode: C++ PennyLane Lightning
  epochs: 20                  # Deep convergence target
  learning_rate: 0.00085      
  dropout: 0.2
  patience: 10
  save_model: True
  model_path: "backend/models/weights/omega_sentinel_best.pt"
  enforce_publication_integrity: True 

# 🔬 Model Hyperparameters (v37.0 - 6-Layer Omega Architecture)
model:
  input_dim: 384
  n_qubits: 8                 # SOTA 8-Qubit expressibility (Xeon-Optimized)
  n_layers: 6                 # Deep 6-Layer QCNN Depth (High Feature Grain)
  n_classes: 3
  projection_enabled: True
  lang_embed_dim: 16          # 16-dim Dialect Anchor Embedding
  bridge_dim: 128             

# 🧬 Experiment Protocol Registry
experiments:
  - id: "EXP_A"
    description: "Classical + Nexus (Baseline)"
    use_qcnn: False
    use_nexus: True
  - id: "EXP_B"
    description: "Classical + QCNN (Quantum Contribution)"
    use_qcnn: True
    use_nexus: False
  - id: "EXP_C"
    description: "Classical + QCNN + Nexus (Omega Sentinel)"
    use_qcnn: True
    use_nexus: True

# 📊 Data Distribution
data:
  merged_path: "datasets/processed/merged/final_merged.csv"
  languages: ["english", "hindi", "bhojpuri", "maithili"]
  val_split: 0.1
  test_split: 0.1

# 📜 Evaluation Logging
logging:
  output_dir: "evaluation/latest"
  results_json: "evaluation/omega_results.json"
  trace_json: "evaluation/history/omega_trace.json"
  comparison_plot: "evaluation/plots/omega_comparison.png"
  gradient_log: "logs/gradient_flow.log"
